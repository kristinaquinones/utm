services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      # Published only on the dedicated loopback alias (127.94.0.1), so :443 is
      # exclusively this app's and can't be shadowed by apps on 127.0.0.1.
      # The alias is created at boot by scripts/setup-reserved-host.sh.
      #
      # Port 80 is intentionally NOT published: other containers on this machine
      # bind 0.0.0.0:80 (all interfaces), which occupies port 80 on every IP
      # including the alias. So there is no http->https redirect; open the https
      # URL directly. 443 stays free here, which is all this app needs.
      - "127.94.0.1:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certs:/certs:ro
      - ./scripts/caddy-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      - utm

  utm:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      # psycopg v3 driver. Local dev credentials only; production supplies its
      # own DATABASE_URL and SESSION_SECRET through the platform secret store.
      DATABASE_URL: postgresql+psycopg://utm:utm@db:5432/utm
      ADMIN_EMAILS: admin@localhost
      SESSION_SECRET: dev-secret-change-me
      # Passwordless local sign-in until magic-link lands. Off by default; this
      # opt-in is local-dev only and is refused when APP_ENV=production.
      DEV_LOGIN: "1"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: utm
      POSTGRES_PASSWORD: utm
      POSTGRES_DB: utm
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utm -d utm"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
