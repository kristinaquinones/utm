<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}UTM link builder{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">local campaign tooling</p>
        <h1>UTM link builder</h1>
      </div>
      <a class="button secondary" href="/export/links.csv">Export CSV</a>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', path='/app.js') }}" defer></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
